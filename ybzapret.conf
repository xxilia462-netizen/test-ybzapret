# --- Конфигурация ybzapret Lite ---

# Режим работы (самый стабильный для Windows/Linux)
MODE=nfqueue

# Пути к твоим спискам (настраиваем под твою структуру)
LIST_YOUTUBE="./configs/lists/youtube.txt"
LIST_DISCORD="./configs/lists/discord.txt"

# Стратегия обхода (Fake-пакеты, чтобы обмануть провайдера)
# Это база, которая сейчас заводит Ютуб в 4K
STRATEGY="--desync=fake --desync-ttl=5"

# Параметры для Дискорда (чтобы не лагал голос)
DISCORD_FIX=1
  
